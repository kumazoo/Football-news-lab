<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ジャーナリストランキング | Football News Lab</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1><a href="index.html" style="text-decoration: none; color: inherit;">Football News Lab</a></h1>
</header>

<nav>
    <a href="archive.html" class="nav-btn">ニュース</a>
    <a href="journalist.html" class="nav-btn active">ジャーナリスト</a>
</nav>

<main>
    <div class="archive-container">
        <h2 style="text-align: center; margin-bottom: 30px;">journalist RANKING</h2>

        <div class="filter-section" style="background: #f9f9f9; padding: 20px; border-radius: 8px; margin-bottom: 30px;">
            <!-- ジャーナリスト名検索 -->
            <div class="search-box">
                <input type="text" id="journalist-search" placeholder="ジャーナリスト名で検索..." style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 1rem;">
            </div>
        </div>

        <div id="journalist-list" class="journalist-list">
            <!-- ここにランキング形式でジャーナリストが表示されます -->
        </div>

        <div id="pagination-controls" style="display: flex; justify-content: center; gap: 10px; margin-top: 30px;"></div>
    </div>
</main>

<footer>
    <p style="text-align: center;">&copy; 2026 Football News Lab</p>
</footer>

<script>
    let alljournalists = [];
    let searchQuery = '';
    let currentPage = 1;
    const itemsPerPage = 10;

    async function loadjournalists() {
        try {
            const response = await fetch('articles/list.json');
            const articles = await response.json();
            
            // ジャーナリスト情報の抽出と集約
            const journalistMap = {};
            articles.forEach(article => {
                if (article.journalist) {
                    // 最新の的中率と件数を保持（同じ名前のジャーナリストは同一人物として扱う）
                    journalistMap[article.journalist] = {
                        name: article.journalist,
                        accuracy: article.accuracy,
                        count: article.count
                    };
                }
            });

            // オブジェクトを配列に変換し、的中率順にソート
            alljournalists = Object.values(journalistMap).sort((a, b) => b.accuracy - a.accuracy);
            
            renderjournalists();
        } catch (e) {
            console.error("Failed to load journalists.");
        }
    }

    function renderjournalists() {
        const container = document.getElementById('journalist-list');
        const paginationContainer = document.getElementById('pagination-controls');
        container.innerHTML = '';
        paginationContainer.innerHTML = '';

        // 検索フィルタリング
        const filtered = alljournalists.filter(journalist => 
            journalist.name.toLowerCase().includes(searchQuery.toLowerCase())
        );

        const totalPages = Math.ceil(filtered.length / itemsPerPage);
        const startIndex = (currentPage - 1) * itemsPerPage;
        const pagedjournalists = filtered.slice(startIndex, startIndex + itemsPerPage);

        if (pagedjournalists.length === 0) {
            container.innerHTML = '<p style="text-align:center; color:#999; padding: 40px;">該当するジャーナリストが見てつかりません。</p>';
            return;
        }

        pagedjournalists.forEach((journalist, index) => {
            // 全体の中での順位を計算
            const rank = startIndex + index + 1;
            
            const card = document.createElement('div');
            card.className = 'journalist-rank-card';
            card.innerHTML = `
                <div class="rank-number">${rank}</div>
                <div class="journalist-main-info">
                    <div class="journalist-name">${journalist.name}</div>
                    <div class="journalist-stats-summary">
                        総記事数: <strong>${journalist.count}</strong> / 
                        平均的中率: <span class="accuracy-value">${journalist.accuracy}%</span>
                    </div>
                </div>
                <div class="rank-badge">${getRankBadge(rank)}</div>
            `;
            container.appendChild(card);
        });

        // ページネーション生成
        if (totalPages > 1) {
            for (let i = 1; i <= totalPages; i++) {
                const pageBtn = document.createElement('button');
                pageBtn.innerText = i;
                pageBtn.className = `filter-btn ${i === currentPage ? 'active' : ''}`;
                pageBtn.onclick = () => {
                    currentPage = i;
                    renderjournalists();
                    window.scrollTo(0, 0);
                };
                paginationContainer.appendChild(pageBtn);
            }
        }
    }

    function getRankBadge(rank) {
        if (rank === 1) return '🥇';
        if (rank === 2) return '🥈';
        if (rank === 3) return '🥉';
        return '';
    }

    document.getElementById('journalist-search').addEventListener('input', (e) => {
        searchQuery = e.target.value;
        currentPage = 1;
        renderjournalists();
    });

    loadjournalists();
</script>
</body>
</html>
