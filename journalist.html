<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ジャーナリストランキング | Football Transfer Lab | トララボ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="main-header">
    <!-- サイト説明文 -->
    <p class="site-description">サッカー移籍情報特化サイト</p>

    <!-- ロゴ画像 -->
    <h1>
        <a href="index.html">
            <img src="transferlab_logo.jpg" alt="Football Transfer Lab" class="logo-img">
        </a>
    </h1>
</header>

<nav style="text-align: center; margin-top: 15px;">
    <a href="journalist.html" class="nav-btn">ジャーナリスト</a>
    <a href="archive.html?genre=transfer" class="nav-btn">移籍ニュース</a>
    <a href="archive.html?genre=other" class="nav-btn">トピック</a>
</nav>

<main>
    <div class="archive-container">
        <h2 style="text-align: center; margin-bottom: 30px;">JOURNALIST RANKING</h2>

        <div class="filter-section" style="background: #f9f9f9; padding: 20px; border-radius: 8px; margin-bottom: 30px;">
            <div class="search-box">
                <input type="text" id="journalist-search" placeholder="ジャーナリスト名で検索..." style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 1rem;">
            </div>
        </div>

        <div id="journalist-list" class="journalist-list"></div>
        <div id="pagination-controls" style="display: flex; justify-content: center; gap: 10px; margin-top: 30px;"></div>
    </div>
</main>

<footer style="text-align: center; padding: 20px 0; border-top: 1px solid #eee; margin-top: 40px;">
    <div style="margin-bottom: 10px;">
    <a href="about.html" style="color: #666; text-decoration: none; font-size: 0.8rem; margin: 0 10px;">当サイトについて</a>
    <a href="contact.html" style="color: #666; text-decoration: none; font-size: 0.8rem; margin: 0 10px;">お問い合わせ</a>
    <a href="privacy.html" style="color: #666; text-decoration: none; font-size: 0.8rem; margin: 0 10px;">プライバシーポリシー</a>
</div>
    <p style="font-size: 0.75rem; color: #888;">&copy; 2026 Football Transfer Lab</p>
</footer>

<script>
    let allJournalists = [];
    let searchQuery = '';
    let currentPage = 1;
    const itemsPerPage = 10;

    async function loadJournalists() {
        try {
            const response = await fetch('articles/list.json');
            const articles = await response.json();
            
            const journalistMap = {};
            articles.forEach(article => {
                if (article.journalist) {
                    journalistMap[article.journalist] = {
                        name: article.journalist,
                        accuracy: article.accuracy,
                        count: article.count
                    };
                }
            });

            allJournalists = Object.values(journalistMap).sort((a, b) => b.accuracy - a.accuracy);
            renderJournalists();
        } catch (e) {
            console.error("Failed to load journalists.");
        }
    }

    function renderJournalists() {
        const container = document.getElementById('journalist-list');
        const paginationContainer = document.getElementById('pagination-controls');
        container.innerHTML = '';
        paginationContainer.innerHTML = '';

        const filtered = allJournalists.filter(j => 
            j.name.toLowerCase().includes(searchQuery.toLowerCase())
        );

        const totalPages = Math.ceil(filtered.length / itemsPerPage);
        const startIndex = (currentPage - 1) * itemsPerPage;
        const paged = filtered.slice(startIndex, startIndex + itemsPerPage);

        paged.forEach((j, index) => {
            const rank = startIndex + index + 1;
            const card = document.createElement('div');
            card.className = 'journalist-rank-card';
            card.innerHTML = `
                <div class="rank-number">${rank}</div>
                <div class="journalist-main-info">
                    <div class="journalist-name">
                        <a href="archive.html?journalist=${encodeURIComponent(j.name)}" style="text-decoration: none; color: inherit; border-bottom: 1px dashed #2A6A35;">
                            ${j.name}
                        </a>
                    </div>
                    <div class="journalist-stats-summary">
                        総記事数: <strong>${j.count}</strong> / 
                        的中率: <span class="accuracy-value">${j.accuracy}%</span>
                    </div>
                </div>
                <div class="rank-badge">${rank <= 3 ? ['🥇','🥈','🥉'][rank-1] : ''}</div>
            `;
            container.appendChild(card);
        });

        if (totalPages > 1) {
            for (let i = 1; i <= totalPages; i++) {
                const btn = document.createElement('button');
                btn.innerText = i;
                btn.className = `filter-btn ${i === currentPage ? 'active' : ''}`;
                btn.onclick = () => { currentPage = i; renderJournalists(); window.scrollTo(0, 0); };
                paginationContainer.appendChild(btn);
            }
        }
    }

    document.getElementById('journalist-search').addEventListener('input', (e) => {
        searchQuery = e.target.value;
        currentPage = 1;
        renderJournalists();
    });

    loadJournalists();
</script>
</body>
</html>
