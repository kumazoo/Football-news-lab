<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ニュース一覧 | Football Transfer Lab</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1><a href="index.html" style="text-decoration: none; color: inherit;">Football Transfer Lab</a></h1>
</header>

<nav>
    <a href="archive.html" class="nav-btn active">ニュース</a>
    <a href="journalist.html" class="nav-btn">ジャーナリスト</a>
</nav>

<main>
    <div class="archive-container">
        <h2 id="archive-title" style="text-align: center; margin-bottom: 30px;">NEWS ARCHIVE</h2>

        <div class="filter-section" style="background: #f9f9f9; padding: 20px; border-radius: 8px; margin-bottom: 30px;">
            
            <!-- フリーワード検索バー -->
            <div class="search-box" style="margin-bottom: 20px;">
                <input type="text" id="search-input" placeholder="記事タイトル、タグ、ジャーナリスト名で検索..." style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 1rem;">
            </div>

            <!-- ジャンル選択（動的に出し分けます） -->
            <div class="filter-group" style="margin-bottom: 15px;">
                <p id="genre-label" style="font-size: 0.8rem; font-weight: bold; margin-bottom: 8px; color: #666;">GENRE:</p>
                <div id="genre-filters" class="filter-buttons">
                    <!-- JSでボタンが生成されます -->
                </div>
            </div>

            <!-- 地域選択 -->
            <div class="filter-group">
                <p style="font-size: 0.8rem; font-weight: bold; margin-bottom: 8px; color: #666;">REGION:</p>
                <div id="region-filters" class="filter-buttons">
                    <button class="filter-btn active" data-region="all">すべて</button>
                    <button class="filter-btn" data-region="japan">日本</button>
                    <button class="filter-btn" data-region="england">イングランド</button>
                    <button class="filter-btn" data-region="spain">スペイン</button>
                    <button class="filter-btn" data-region="italy">イタリア</button>
                    <button class="filter-btn" data-region="germany">ドイツ</button>
                    <button class="filter-btn" data-region="france">フランス</button>
                    <button class="filter-btn" data-region="etc">その他</button>
                </div>
            </div>
        </div>

        <div id="archive-list" class="archive-list"></div>
        <div id="pagination-controls" style="display: flex; justify-content: center; gap: 10px; margin-top: 30px;"></div>
    </div>
</main>

<footer>
    <p style="text-align: center;">&copy; 2026 Football Transfer Lab</p>
</footer>

<script>
    let allArticles = [];
    let mode = 'all'; // 'transfer' or 'topics' or 'all'
    let currentGenre = 'all';
    let currentRegion = 'all';
    let searchQuery = ''; 
    let currentPage = 1;
    const itemsPerPage = 10;

    // --- URLパラメータの解析 ---
    const urlParams = new URLSearchParams(window.location.search);
    const paramGenre = urlParams.get('genre'); // indexからの'transfer' or 'other'
    const paramJournalist = urlParams.get('journalist');

    if (paramGenre === 'transfer') {
        mode = 'transfer';
        currentGenre = 'transfer';
    } else if (paramGenre === 'other') {
        mode = 'topics';
        currentGenre = 'all';
    }

    if (paramJournalist) searchQuery = paramJournalist;

    async function loadArchive() {
        try {
            const response = await fetch('articles/list.json');
            allArticles = await response.json();
            
            setupGenreButtons();
            
            if (searchQuery) {
                document.getElementById('search-input').value = searchQuery;
            }

            renderArchive();
        } catch (e) {
            console.error("Failed to load articles.");
        }
    }

    // モードに合わせてボタンを生成
    function setupGenreButtons() {
        const container = document.getElementById('genre-filters');
        const title = document.getElementById('archive-title');
        container.innerHTML = '';

        if (mode === 'transfer') {
            title.innerText = '移籍ニュース アーカイブ';
            container.innerHTML = `<button class="filter-btn active" data-genre="transfer">移籍</button>`;
        } else if (mode === 'topics') {
            title.innerText = 'その他トピック アーカイブ';
            container.innerHTML = `
                <button class="filter-btn active" data-genre="all">すべて</button>
                <button class="filter-btn" data-genre="match">試合</button>
                <button class="filter-btn" data-genre="injury">負傷</button>
                <button class="filter-btn" data-genre="team">チーム</button>
                <button class="filter-btn" data-genre="player">選手</button>
                <button class="filter-btn" data-genre="etc">その他</button>
            `;
        } else {
            title.innerText = 'すべてのニュース';
            container.innerHTML = `
                <button class="filter-btn active" data-genre="all">すべて</button>
                <button class="filter-btn" data-genre="transfer">移籍</button>
                <button class="filter-btn" data-genre="match">試合</button>
                <button class="filter-btn" data-genre="injury">負傷</button>
                <button class="filter-btn" data-genre="team">チーム</button>
                <button class="filter-btn" data-genre="player">選手</button>
            `;
        }

        // 生成したボタンにイベントリスナーを追加
        container.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                container.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentGenre = e.target.dataset.genre;
                currentPage = 1;
                renderArchive();
            });
        });
    }

    function renderArchive() {
        const container = document.getElementById('archive-list');
        const paginationContainer = document.getElementById('pagination-controls');
        container.innerHTML = '';
        paginationContainer.innerHTML = '';

        const filtered = allArticles.filter(article => {
            // 1. モードによる大きな切り分け
            if (mode === 'transfer' && article.genre !== 'transfer') return false;
            if (mode === 'topics' && article.genre === 'transfer') return false;

            // 2. 詳細ジャンルの絞り込み
            const matchGenre = (currentGenre === 'all' || article.genre === currentGenre);
            
            // 3. 地域
            const matchRegion = (currentRegion === 'all' || (article.tags && article.tags.includes(currentRegion)));
            
            // 4. 検索ワード
            const lowerQuery = searchQuery.toLowerCase();
            const matchSearch = article.title.toLowerCase().includes(lowerQuery) || 
                               (article.tags && article.tags.some(tag => tag.toLowerCase().includes(lowerQuery))) ||
                               (article.journalist && article.journalist.toLowerCase().includes(lowerQuery));
            
            return matchGenre && matchRegion && matchSearch;
        }).reverse();

        // ページネーションと表示処理（省略せず現行通り）
        const totalPages = Math.ceil(filtered.length / itemsPerPage);
        const startIndex = (currentPage - 1) * itemsPerPage;
        const pagedArticles = filtered.slice(startIndex, startIndex + itemsPerPage);

        if (pagedArticles.length === 0) {
            container.innerHTML = '<p style="text-align:center; color:#999; padding: 40px;">該当する記事が見つかりません。</p>';
            return;
        }

        pagedArticles.forEach(article => {
            const dateId = article.id.substring(0, 6);
            const formattedDate = `20${dateId.substring(0, 2)}.${dateId.substring(2, 4)}.${dateId.substring(4, 6)}`;
            const card = document.createElement('div');
            card.className = 'archive-item';
            card.innerHTML = `
                <a href="articles/${article.id}.html" style="text-decoration: none; color: inherit; display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #eee;">
                    <div>
                        <span class="tag tag-${article.genre}" style="font-size: 0.65rem;">${getGenreLabel(article.genre)}</span>
                        <h3 style="margin: 5px 0; font-size: 1rem;">${article.title}</h3>
                        <span style="font-size: 0.75rem; color: #999;">${formattedDate} | Journalist: ${article.journalist}</span>
                    </div>
                    <div style="font-size: 1.2rem; color: #ccc;">&rsaquo;</div>
                </a>
            `;
            container.appendChild(card);
        });

        if (totalPages > 1) {
            for (let i = 1; i <= totalPages; i++) {
                const pageBtn = document.createElement('button');
                pageBtn.innerText = i;
                pageBtn.className = `filter-btn ${i === currentPage ? 'active' : ''}`;
                pageBtn.onclick = () => { currentPage = i; renderArchive(); window.scrollTo(0, 0); };
                paginationContainer.appendChild(pageBtn);
            }
        }
    }

    function getGenreLabel(genre) {
        const labels = {'transfer': '移籍', 'match': '試合', 'injury': '負傷', 'team': 'チーム', 'player': '選手', 'etc': 'その他'};
        return labels[genre] || 'その他';
    }

    document.getElementById('search-input').addEventListener('input', (e) => {
        searchQuery = e.target.value;
        currentPage = 1;
        renderArchive();
    });

    document.querySelectorAll('#region-filters .filter-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            document.querySelectorAll('#region-filters .filter-btn').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            currentRegion = e.target.dataset.region;
            currentPage = 1;
            renderArchive();
        });
    });

    loadArchive();
</script>
</body>
</html>
