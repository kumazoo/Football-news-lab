<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Transfer Lab | サッカー移籍情報特化サイト</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="main-header">
    <p class="site-description">サッカー移籍情報特化サイト</p>
    <h1><a href="index.html"><img src="transferlab_logo.jpg" alt="Football Transfer Lab" class="logo-img"></a></h1>
</header>

<nav>
    <a href="journalist.html" class="nav-btn">ジャーナリスト</a>
    <a href="archive.html?genre=transfer" class="nav-btn">移籍ニュース</a>
    <a href="archive.html?genre=other" class="nav-btn">トピック</a>
</nav>

<main>
    <!-- 1. 注目記事エリア -->
    <h2 class="section-title">注目ニュース</h2>
    <section id="featured-section" class="featured-grid"></section>

    <!-- 2. 新着記事一覧エリア -->
    <h2 class="section-title">新着ニュース</h2>
    <section id="recent-list" class="article-list"></section>

    <div style="text-align: center; margin-top: 30px;">
        <a href="archive.html" class="view-more">もっと見る</a>
    </div>
</main>

<footer style="text-align: center; padding: 20px 0; border-top: 1px solid #eee; margin-top: 40px;">
    <div style="margin-bottom: 10px;">
        <a href="about.html" style="color: #666; text-decoration: none; font-size: 0.8rem; margin: 0 10px;">当サイトについて</a>
        <a href="contact.html" style="color: #666; text-decoration: none; font-size: 0.8rem; margin: 0 10px;">お問い合わせ</a>
        <a href="privacy.html" style="color: #666; text-decoration: none; font-size: 0.8rem; margin: 0 10px;">プライバシーポリシー</a>
    </div>
    <p style="font-size: 0.75rem; color: #888;">&copy; 2026 Football Transfer Lab</p>
</footer>

<script>
    async function loadIndexContent() {
        try {
            // list.jsonを取得（キャッシュ対策のためクエリを付与）
            const response = await fetch('list.json?v=' + new Date().getTime());
            if (!response.ok) return;
            const allArticles = await response.json();

            // --- 1. 注目記事の表示 (最新2件) ---
            const featuredSection = document.getElementById('featured-section');
            const featuredArticles = allArticles.slice(0, 2); // 最新2件

            featuredArticles.forEach(article => {
                const card = document.createElement('div');
                card.className = 'featured-card';
                
                // 画像判定：記事データにimageプロパティがあればそれを使い、なければロゴを表示
                // list.jsonにimage項目がなくても、これで自動的にロゴになります
                const bgImage = article.image ? article.image : 'transferlab_logo.jpg';
                
                card.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.7)), url('${bgImage}')`;
                
                card.innerHTML = `
                    <div class="featured-content">
                        <h3>${article.title}</h3>
                        <a href="articles/${article.id}.html" class="btn">ニュースをチェック</a>
                    </div>
                `;
                featuredSection.appendChild(card);
            });

            // --- 2. 新着記事リストの表示 (最新5件) ---
            const recentList = document.getElementById('recent-list');
            const recentArticles = allArticles.slice(0, 5); // 最新5件

            recentArticles.forEach(article => {
                const item = document.createElement('article');
                item.className = 'article-card';
                
                // ジャンルに応じたタグの色分け
                const tagClass = article.genre === 'transfer' ? 'tag-transfer' : 'tag-other';
                const tagText = article.genre === 'transfer' ? '移籍' : 'トピック';

                item.innerHTML = `
                    <span class="tag ${tagClass}">${tagText}</span>
                    <h3><a href="articles/${article.id}.html">${article.title}</a></h3>
                    <p class="article-meta">JOURNALIST: ${article.journalist} (${article.accuracy}%) | ${article.id.substring(0,6)}</p>
                `;
                recentList.appendChild(item);
            });

        } catch (e) {
            console.error("Index content load failed.", e);
        }
    }

    // 読み込み実行
    loadIndexContent();
</script>

</body>
</html>
