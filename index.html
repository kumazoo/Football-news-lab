<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football News Lab | 海外サッカー情報集約サイト</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1><a href="index.html" style="text-decoration: none; color: inherit;">Football News Lab</a></h1>
</header>

<!-- メニューボタン（仮） -->
<nav style="text-align: center; margin-top: 15px;">
    <a href="index.html" class="nav-btn">ニュース</a>
    <a href="#" class="nav-btn">ライター</a>
</nav>

<main>
    <!-- 注目記事エリア -->
    <h2 class="section-title">FEATURED</h2>
    <section id="featured-section" class="featured-grid">
        <!-- JSで画像付きカードが生成されます -->
    </section>

    <!-- バナー広告枠（仮） -->
    <div style="width: 100%; height: 90px; background: #ddd; display: flex; align-items: center; justify-content: center; margin: 30px 0; color: #888; font-size: 12px;">
        ADVERTISEMENT
    </div>

    <!-- 最新記事一覧 -->
    <h2 class="section-title">LATEST NEWS</h2>
    <section id="news-feed" class="news-feed">
        <!-- JSでリストが生成されます -->
    </section>
</main>

<footer>
    &copy; 2026 Football News Lab
</footer>

<!-- Iframelyの読み込みスクリプト -->
<script async src="https://iframely.net/embed.js"></script>

<script>
async function loadPage() {
    try {
        const response = await fetch('articles/list.json');
        const articles = await response.json();
        
        const featuredSection = document.getElementById('featured-section');
        const newsFeed = document.getElementById('news-feed');

        // 1. 注目記事（featured: true）を表示
        const featuredList = articles.filter(a => a.featured).slice(-2).reverse();
        featuredList.forEach(article => {
            const card = document.createElement('div');
            card.className = 'featured-card';
            // ポイント：data-iframely-url の末尾に &media=1 を追加して画像メインにする
            card.innerHTML = `
                <a href="articles/${article.id}.html" class="featured-card-link">
                    <div class="iframely-embed">
                        <div class="iframely-responsive">
                            <a href="${article.source_url}" data-iframely-url="https://iframely.net/UzVCqlcc?theme=light&media=1"></a>
                        </div>
                    </div>
                    <div class="featured-info">
                        <h3 class="featured-title">${article.title}</h3>
                        <span class="featured-read-btn">記事を読む</span>
                    </div>
                </a>
            `;
            featuredSection.appendChild(card);
        });

        // 2. 最新記事一覧（全記事を表示）
        articles.slice().reverse().forEach(article => {
            const item = document.createElement('a');
            item.href = `articles/${article.id}.html`;
            item.className = 'news-item-link';
            item.innerHTML = `
                <article class="news-card">
                    <div class="news-meta">
                        <span class="news-date">${article.id.substring(0,6)}</span>
                        <h3 class="news-title">${article.title}</h3>
                    </div>
                </article>
            `;
            newsFeed.appendChild(item);
            // 新しく追加されたリンクをIframelyに再スキャンさせる
            if (window.iframely) {
            iframely.load();
    }
        });
    } catch (e) {
        console.error("Failed to load articles.");
    }
}
loadPage();
</script>

</body>
</html>
