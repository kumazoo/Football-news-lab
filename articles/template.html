<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【記事タイトルを入力】 | Football News Lab</title>
    <link rel="stylesheet" href="../style.css">
    <script async src="https://iframely.net/embed.js"></script>
</head>
<body>

<header>
    <h1><a href="../index.html" style="text-decoration: none; color: inherit;">Football News Lab</a></h1>
</header>

<nav>
    <a href="../archive.html" class="nav-btn">ニュース</a>
    <a href="../journalist.html" class="nav-btn">ジャーナリスト</a>
</nav>>

<main>
    <article class="article-card">
        <!-- 1. 記事ジャンル -->
        <span class="tag tag-transfer">【ジャンル名を入力】</span>
        
        <!-- 2. 記事タイトル -->
        <h2 id="article-title" style="margin-bottom: 10px;">【記事タイトルを入力】</h2>

        <!-- 3. 投稿日（タイトルの下に追加） -->
        <div class="post-date" style="font-size: 0.85rem; color: #888; margin-bottom: 10px; font-family: monospace;">
            POSTED: <span id="article-date">0000.00.00</span>
        </div>

        <!-- 4. 詳細タグ -->
        <div id="tags-container" style="margin-bottom: 10px;"></div>

        <!-- 5. ジャーナリスト情報 -->
        <div id="journalist-info-area"></div>

        <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">

        <!-- 6. 導入文 -->
        <div class="original-intro">
            <p>【導入文：ここにあなたの視点を1〜2文で入力】</p>
        </div>

        <!-- 引用カードと要約のセット枠 -->
        <div class="quote-summary-group" style="border: 1px solid #e0e0e0; border-radius: 8px; padding: 20px; background-color: #fcfcfc; margin: 25px 0;">
            <!-- 7. 引用記事カード -->
            <div class="iframely-container" style="margin-bottom: 20px;">
                <!-- ここにIframelyのaタグを貼り付け -->
            </div>

            <!-- 8. 要約 -->
            <div class="summary" style="background: #fff; padding: 15px; border-radius: 6px; border: 1px solid #eee;">
                <strong style="display: block; margin-bottom: 10px;">■ 要約（ソース：【メディア名を入力】）</strong>
                <ul style="margin: 0; padding-left: 20px;">
                    <li>【要約ポイント1】</li>
                    <li>【要約ポイント2】</li>
                    <li>【要約ポイント3】</li>
                </ul>
            </div>
        </div>

        <!-- 9. 選手・用語解説 -->
        <div class="supplementary-info">
            <h3>📊 Player Profile / 📌 Keyword</h3>
            <div class="supplementary-content">
                【AI等で生成した選手の遍歴や用語の解説文を入力】<br>
                <a href="【WikipediaのURL】" target="_blank" class="wiki-link-btn">Wikipediaで詳細を確認</a>
            </div>
        </div>

        <!-- 10. 関連記事 -->
        <div class="supplementary-info" style="border-top: none; margin-top: 15px;">
            <h3>🔗 関連記事</h3>
            <div class="supplementary-content" style="background-color: transparent; padding: 0;">
                <ul id="related-list" style="margin: 0; padding-left: 20px;"></ul>
                <div style="margin-top: 10px;">
                    <a href="../index.html" style="font-size: 13px;">新着記事一覧に戻る</a>
                </div>
            </div>
        </div>
    </article>
</main>

<footer>
    &copy; 2026 Football News Lab
</footer>

<script>
    /* 記事ごとにここを書き換えてください */
    const currentArticleTags = ["tag1", "tag2"]; 
    const currentArticleId = "XXXXXX_article_id"; 

    async function loadArticleContent() {
        try {
            const response = await fetch('list.json');
            if (!response.ok) return;
            const allArticles = await response.json();
            const articleData = allArticles.find(a => a.id === currentArticleId);

            if (articleData) {
                // タイトルの反映
                document.getElementById('article-title').innerText = articleData.title;

                // 投稿日の反映（IDの先頭6桁から日付を生成）
                // 例: 260428_... -> 2026.04.28
                const dateId = articleData.id.substring(0, 6);
                const formattedDate = `20${dateId.substring(0, 2)}.${dateId.substring(2, 4)}.${dateId.substring(4, 6)}`;
                document.getElementById('article-date').innerText = formattedDate;

                // 詳細タグの反映
                const tagsContainer = document.getElementById('tags-container');
                if (articleData.tags) {
                    articleData.tags.forEach(tag => {
                        const span = document.createElement('span');
                        span.className = 'tag'; 
                        span.innerText = tag;
                        tagsContainer.appendChild(span);
                    });
                }

                // ジャーナリスト情報の反映
                const infoArea = document.getElementById('journalist-info-area');
                if (articleData.journalist) {
                    infoArea.innerHTML = `
                        <div class="journalist-info" style="margin: 5px 0 15px 0;">
                            <span class="journalist-label">JOURNALIST:</span>
                            <span class="journalist-name">${articleData.journalist}</span>
                            <span class="journalist-stats">
                                (的中率: <span class="accuracy-value">${articleData.accuracy}%</span> / 総件数: <span class="count-value">${articleData.count}</span>件)
                            </span>
                        </div>
                    `;
                }

                // 関連記事の生成
                const listElement = document.getElementById('related-list');
                const related = allArticles.filter(article => {
                    return article.id !== currentArticleId && 
                           article.tags.some(tag => currentArticleTags.includes(tag));
                });
                const limitedRelated = related.slice(-3).reverse();

                if (limitedRelated.length === 0) {
                    listElement.innerHTML = '<li>（関連する過去記事はありません）</li>';
                } else {
                    limitedRelated.forEach(article => {
                        const li = document.createElement('li');
                        li.innerHTML = `<a href="${article.id}.html" style="font-size: 13px;">${article.title}</a>`;
                        listElement.appendChild(li);
                    });
                }
            }
        } catch (e) {
            console.error("Content load failed.");
        }
    }
    loadArticleContent();
</script>

</body>
</html>
